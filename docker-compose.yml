version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: stylo-server
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - stylo-network

  # Optional: PostgreSQL for local development
  # Uncomment if you want to run PostgreSQL locally
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: stylo-db
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=postgres
  #     - POSTGRES_DB=stylo
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - stylo-network

networks:
  stylo-network:
    driver: bridge

